<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scalvicon — Premium Web Solutions for SMEs & Emerging Brands</title>
  <meta name="description"
    content="Premium web development and digital solutions tailored for SMEs and emerging brands. Scalvicon builds high-performance, SEO-optimized websites that drive growth." />
  <meta name="author" content="Scalvicon" />
  <meta name="robots" content="index, follow" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/favicon.ico" />

  <!-- Open Graph & Twitter: injected dynamically per-page by react-helmet-async -->
  <!-- Static fallbacks for crawlers that don't execute JS are handled via SSG/prerender -->
  <meta property="og:site_name" content="Scalvicon" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Speed Optimization: Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
  <link rel="dns-prefetch" href="https://scalvicon-9bf2f.firebaseapp.com" />

  <!-- Preload Critical Fonts (Matching actual stylesheet usage) -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    as="style" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  </noscript>
</head>

<body>
  <main id="root"></main>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Google Analytics: Loading non-critical scripts at bottom to prioritize LCP -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S10FJPH9Q9"></script>
  <script>
    window.onload = function() {
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-S10FJPH9Q9');
    }
  </script>
</body>

</html>
